openapi: 3.1.0
info:
  title: AIWebFeeds - Real-Time Monitoring API
  version: 3.0.0
  description: |
    REST API for Phase 3B: Real-Time Feed Monitoring & Alerts
    
    Features:
    - Notification management (list, mark read, dismiss)
    - Notification preferences (per-feed, global settings)
    - Manual feed polling (admin)
    - Email digest subscriptions
    - Trending topics discovery
  contact:
    name: AIWebFeeds
    url: https://github.com/wyattowalsh/ai-web-feeds
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:3000/api
    description: Development server
  - url: https://aiwebfeeds.com/api
    description: Production server

tags:
  - name: Notifications
    description: User notification management
  - name: Preferences
    description: Notification preference settings
  - name: Digests
    description: Email digest subscriptions
  - name: Trending
    description: Trending topics discovery
  - name: Polling
    description: Feed polling management (admin)

paths:
  /notifications:
    get:
      tags: [Notifications]
      summary: List user notifications
      description: Retrieve paginated list of notifications for authenticated user
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: Anonymous user ID from localStorage
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Number of notifications to return
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Pagination offset
        - name: unread_only
          in: query
          schema:
            type: boolean
            default: false
          description: Filter to unread notifications only
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /notifications/{id}/read:
    post:
      tags: [Notifications]
      summary: Mark notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Notification ID
      responses:
        '200':
          description: Notification marked as read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
        '404':
          $ref: '#/components/responses/NotFound'

  /notifications/{id}/dismiss:
    post:
      tags: [Notifications]
      summary: Dismiss notification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Notification ID
      responses:
        '200':
          description: Notification dismissed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
        '404':
          $ref: '#/components/responses/NotFound'

  /preferences:
    get:
      tags: [Preferences]
      summary: Get notification preferences
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: Anonymous user ID
      responses:
        '200':
          description: User notification preferences
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NotificationPreference'

    post:
      tags: [Preferences]
      summary: Create or update notification preference
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationPreferenceCreate'
      responses:
        '201':
          description: Preference created/updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPreference'
        '400':
          $ref: '#/components/responses/BadRequest'

  /digests:
    get:
      tags: [Digests]
      summary: Get email digest subscription
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Digest subscription details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailDigest'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Digests]
      summary: Subscribe to email digest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailDigestCreate'
      responses:
        '201':
          description: Digest subscription created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailDigest'
        '400':
          $ref: '#/components/responses/BadRequest'

    delete:
      tags: [Digests]
      summary: Unsubscribe from email digest
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Unsubscribed successfully
        '404':
          $ref: '#/components/responses/NotFound'

  /trending:
    get:
      tags: [Trending]
      summary: Get trending topics
      parameters:
        - name: hours
          in: query
          schema:
            type: integer
            default: 24
            minimum: 1
            maximum: 168
          description: Lookback window in hours
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: List of trending topics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TrendingTopic'

  /poll/{feed_id}:
    post:
      tags: [Polling]
      summary: Trigger manual feed poll (admin only)
      security:
        - ApiKeyAuth: []
      parameters:
        - name: feed_id
          in: path
          required: true
          schema:
            type: string
          description: Feed ID to poll
      responses:
        '202':
          description: Poll job queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedPollJob'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  schemas:
    Notification:
      type: object
      required: [id, type, title, message, created_at, read]
      properties:
        id:
          type: integer
          example: 12345
        type:
          type: string
          enum: [new_article, trending_topic, feed_updated, system_alert]
          example: new_article
        title:
          type: string
          maxLength: 255
          example: "New article from AI Research Blog"
        message:
          type: string
          maxLength: 1000
          example: "Introducing GPT-5: The Next Generation Language Model"
        action_url:
          type: string
          format: uri
          nullable: true
          example: "https://example.com/article/gpt-5"
        metadata:
          type: object
          additionalProperties: true
          example:
            feed_id: "ai-research-blog"
            article_id: 67890
            trend_score: 3.5
        read:
          type: boolean
          example: false
        created_at:
          type: string
          format: date-time
          example: "2025-10-22T14:30:00Z"

    NotificationListResponse:
      type: object
      required: [notifications, total, unread_count]
      properties:
        notifications:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
        total:
          type: integer
          example: 150
        unread_count:
          type: integer
          example: 12

    NotificationPreference:
      type: object
      required: [id, delivery_method, frequency]
      properties:
        id:
          type: integer
          example: 1
        feed_id:
          type: string
          nullable: true
          example: "ai-research-blog"
          description: "NULL for global preferences"
        delivery_method:
          type: string
          enum: [websocket, email, in_app]
          example: websocket
        frequency:
          type: string
          enum: [instant, hourly, daily, weekly, off]
          example: instant
        quiet_hours_start:
          type: string
          format: time
          nullable: true
          example: "22:00"
        quiet_hours_end:
          type: string
          format: time
          nullable: true
          example: "07:00"

    NotificationPreferenceCreate:
      type: object
      required: [user_id, delivery_method, frequency]
      properties:
        user_id:
          type: string
          format: uuid
        feed_id:
          type: string
          nullable: true
        delivery_method:
          type: string
          enum: [websocket, email, in_app]
        frequency:
          type: string
          enum: [instant, hourly, daily, weekly, off]
        quiet_hours_start:
          type: string
          format: time
          nullable: true
        quiet_hours_end:
          type: string
          format: time
          nullable: true

    EmailDigest:
      type: object
      required: [id, schedule_type, timezone, next_send_at, active]
      properties:
        id:
          type: integer
          example: 1
        schedule_type:
          type: string
          enum: [daily, weekly, custom]
          example: daily
        timezone:
          type: string
          example: "America/Los_Angeles"
        next_send_at:
          type: string
          format: date-time
          example: "2025-10-23T09:00:00Z"
        open_rate:
          type: number
          format: float
          minimum: 0
          maximum: 1
          example: 0.35
        click_rate:
          type: number
          format: float
          minimum: 0
          maximum: 1
          example: 0.15
        active:
          type: boolean
          example: true

    EmailDigestCreate:
      type: object
      required: [user_id, email, schedule_type, timezone]
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
          example: "user@example.com"
        schedule_type:
          type: string
          enum: [daily, weekly, custom]
        schedule_cron:
          type: string
          example: "0 9 * * *"
          description: "Cron expression (required for custom schedule)"
        timezone:
          type: string
          example: "America/Los_Angeles"

    TrendingTopic:
      type: object
      required: [id, topic_name, z_score, mention_count, spike_detected_at]
      properties:
        id:
          type: integer
          example: 1
        topic_name:
          type: string
          example: "GPT-5"
        z_score:
          type: number
          format: float
          minimum: 2.0
          example: 3.8
        mention_count:
          type: integer
          minimum: 10
          example: 45
        spike_magnitude:
          type: number
          format: float
          example: 4.5
          description: "mention_count / baseline_frequency"
        spike_detected_at:
          type: string
          format: date-time
          example: "2025-10-22T14:00:00Z"
        related_feeds:
          type: array
          items:
            type: string
          example: ["ai-research-blog", "ml-weekly"]
        related_articles:
          type: array
          items:
            type: integer
          example: [67890, 67891, 67892]

    FeedPollJob:
      type: object
      required: [id, feed_id, status, scheduled_at]
      properties:
        id:
          type: integer
          example: 1
        feed_id:
          type: string
          example: "ai-research-blog"
        status:
          type: string
          enum: [pending, running, success, failure]
          example: pending
        scheduled_at:
          type: string
          format: date-time
          example: "2025-10-22T15:00:00Z"

    Error:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          example: "bad_request"
        message:
          type: string
          example: "Invalid user_id format"
        details:
          type: object
          additionalProperties: true

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "bad_request"
            message: "Invalid request parameters"

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "unauthorized"
            message: "API key required for this endpoint"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "not_found"
            message: "Resource not found"

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Admin API key for polling endpoints

