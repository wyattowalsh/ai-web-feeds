name: Auto-fix Code Issues

on:
  pull_request:
    paths:
      - '**.py'
      - 'pyproject.toml'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-fix:
    name: Auto-fix with Ruff
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run auto-fix via uv scripts
        run: uv run fix

      - name: Check for changes
        id: verify-changed-files
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "changed_files<<EOF" >> $GITHUB_OUTPUT
            git diff --name-only >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes
        if: steps.verify-changed-files.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git commit -m "style: auto-fix code with ruff [skip ci]"
          git push

      - name: Comment on PR
        if: steps.verify-changed-files.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const changedFiles = `${{ steps.verify-changed-files.outputs.changed_files }}`;
            const message = `🤖 **Auto-fixed code formatting and linting issues**

            Fixed files:
            \`\`\`
            ${changedFiles}
            \`\`\`

            Changes applied:
            - ✅ Ruff linting auto-fixes
            - ✅ Code formatting (ruff format)

            *Committed by GitHub Actions*`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
