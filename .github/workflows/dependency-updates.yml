name: Dependency Updates

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    name: Update Python Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Update dependencies
        run: |
          uv lock --upgrade

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update Python dependencies'
          title: '🔄 Update Python Dependencies'
          body: |
            ## Dependency Updates

            This PR updates Python dependencies to their latest compatible versions.

            ### Changes
            - Updated `uv.lock` with latest package versions

            ### Testing
            - [ ] All tests pass
            - [ ] No breaking changes detected

            **Auto-generated by GitHub Actions** 🤖
          branch: chore/update-dependencies
          delete-branch: true
          labels: |
            dependencies
            automated

  update-pre-commit:
    name: Update Pre-commit Hooks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install pre-commit
        run: uv pip install pre-commit

      - name: Update pre-commit hooks
        run: uv run pre-commit autoupdate

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update pre-commit hooks'
          title: '🔄 Update Pre-commit Hooks'
          body: |
            ## Pre-commit Hook Updates

            This PR updates pre-commit hooks to their latest versions.

            ### Changes
            - Updated `.pre-commit-config.yaml` with latest hook versions

            **Auto-generated by GitHub Actions** 🤖
          branch: chore/update-pre-commit-hooks
          delete-branch: true
          labels: |
            dependencies
            automated
