name: Stale Issues and PRs
on:
  schedule:
    - cron: '0 0 * * 0'  # Run weekly on Sundays
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          
          # Issue settings
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had recent activity.
            It will be closed in 14 days if no further activity occurs.
            
            If you believe this issue is still relevant, please:
            - Comment to keep it open
            - Add the `keep-open` label
            - Provide additional context or updates
            
            Thank you for your contributions!
          close-issue-message: |
            This issue was automatically closed due to inactivity.
            
            If you believe this issue should be reopened, please create a new issue with updated information.
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: 'stale'
          exempt-issue-labels: 'keep-open,pinned,security,good-first-issue'
          
          # PR settings
          stale-pr-message: |
            This pull request has been automatically marked as stale because it has not had recent activity.
            It will be closed in 7 days if no further activity occurs.
            
            If you're still working on this PR, please:
            - Push new commits
            - Comment to keep it open
            - Add the `keep-open` label
            
            Thank you for your contributions!
          close-pr-message: |
            This pull request was automatically closed due to inactivity.
            
            If you'd like to continue this work, please reopen the PR or create a new one.
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-pr-label: 'stale'
          exempt-pr-labels: 'keep-open,pinned,security,in-progress'
          
          # General settings
          operations-per-run: 100
          remove-stale-when-updated: true
