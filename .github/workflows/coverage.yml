name: Coverage Report

on:
  push:
    branches: [main]
    paths:
      - '**.py'
      - 'pyproject.toml'
  pull_request:
    branches: [main]
    paths:
      - '**.py'
      - 'pyproject.toml'

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage:
    name: Generate Coverage Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests with coverage via CLI
        run: |
          cd tests
          uv run pytest -q tests/cli tests/packages/ai_web_feeds/unit --ignore=tests/packages/ai_web_feeds/unit/test_nlp_entity_extractor.py --ignore=tests/packages/ai_web_feeds/unit/test_nlp_sentiment_analyzer.py --ignore=tests/packages/ai_web_feeds/unit/test_nlp_topic_modeler.py
          uv run coverage xml -o reports/coverage/coverage.xml

      - name: Generate coverage summary
        id: coverage-summary
        run: |
          cd tests
          COVERAGE=$(uv run coverage report | grep TOTAL | awk '{print $4}' | sed 's/%//')
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT

          # Determine badge color
          if (( $(echo "$COVERAGE >= 90" | bc -l) )); then
            COLOR="brightgreen"
          elif (( $(echo "$COVERAGE >= 75" | bc -l) )); then
            COLOR="green"
          elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then
            COLOR="yellow"
          else
            COLOR="red"
          fi

          echo "badge_color=$COLOR" >> $GITHUB_OUTPUT

          # Generate markdown report
          uv run coverage report --format=markdown > ../coverage-summary.md

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            tests/reports/coverage/
            coverage-summary.md
          retention-days: 30

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 90
          MINIMUM_ORANGE: 75

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./tests/reports/coverage/coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Create coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: YOUR_GIST_ID_HERE
          filename: coverage-badge.json
          label: coverage
          message: ${{ steps.coverage-summary.outputs.coverage }}%
          color: ${{ steps.coverage-summary.outputs.badge_color }}

      - name: Report if coverage below 90%
        run: |
          COVERAGE=${{ steps.coverage-summary.outputs.coverage }}
          if (( $(echo "$COVERAGE < 90" | bc -l) )); then
            echo "::warning::Coverage is $COVERAGE% (required: ≥90%)"
          else
            echo "::notice::Coverage is $COVERAGE% (required: ≥90%)"
          fi
