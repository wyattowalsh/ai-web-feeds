name: Python Code Quality

on:
  push:
    branches: [main, develop]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/python-quality.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/python-quality.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          
      - name: Install dependencies
        run: uv sync --all-extras
        
      - name: Run ruff linter (via uv scripts)
        run: uv run ruff check . --output-format=github
        continue-on-error: true
        id: ruff-check
        
      - name: Check code formatting (via uv scripts)
        run: uv run ruff format --check .
        continue-on-error: true
        id: ruff-format
        
      - name: Generate detailed ruff report
        if: always()
        run: |
          uv run ruff check . --output-format=json > ruff-report.json || true
          uv run ruff check . --output-format=text > ruff-report.txt || true
          
      - name: Upload ruff reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-report-${{ github.run_id }}
          path: |
            ruff-report.json
            ruff-report.txt
          retention-days: 7
          
      - name: Fail if linting or formatting failed
        if: steps.ruff-check.outcome == 'failure' || steps.ruff-format.outcome == 'failure'
        run: |
          echo "::error::Linting or formatting checks failed"
          exit 1

  type-check:
    name: Type Check (MyPy)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          
      - name: Install dependencies
        run: uv sync --all-extras
        
      - name: Run mypy type checking (via uv scripts)
        run: |
          uv run mypy packages/ai_web_feeds/src apps/cli/ai_web_feeds tests --junit-xml mypy-report.xml --html-report mypy-html || true
        continue-on-error: true
        id: mypy-check
          
      - name: Upload mypy reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mypy-report-${{ github.run_id }}
          path: |
            mypy-report.xml
            mypy-html/
          retention-days: 7
          
      - name: Fail if type checking failed
        if: steps.mypy-check.outcome == 'failure'
        run: |
          echo "::error::Type checking failed"
          exit 1

  security-check:
    name: Security Check (Bandit)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          
      - name: Install dependencies
        run: |
          uv sync --all-extras
          uv pip install bandit[toml]
          
      - name: Run bandit security check
        run: |
          uv run bandit -r packages/ai_web_feeds/src apps/cli/ai_web_feeds tests -f json -o bandit-report.json || true
          uv run bandit -r packages/ai_web_feeds/src apps/cli/ai_web_feeds tests -f txt -o bandit-report.txt || true
        continue-on-error: true
        id: bandit-check
          
      - name: Upload bandit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report-${{ github.run_id }}
          path: |
            bandit-report.json
            bandit-report.txt
          retention-days: 7
          
      - name: Display bandit results
        if: always()
        run: |
          echo "=== Bandit Security Scan Results ==="
          cat bandit-report.txt || echo "No report generated"

  test:
    name: Tests (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.13']
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Install dependencies
        run: uv sync --all-extras
        
      - name: Run tests with CLI (coverage mode)
        run: |
          uv run aiwebfeeds test coverage --html
          
      - name: Generate coverage summary
        if: always()
        run: |
          uv run coverage report --format=markdown > coverage-summary.md || true
          uv run coverage report || true
          
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./tests/reports/coverage/coverage.xml
          flags: unittests
          name: codecov-${{ matrix.os }}-py${{ matrix.python-version }}
          fail_ci_if_error: false
          
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            tests/reports/
            coverage-summary.md
          retention-days: 7
          
      - name: Check coverage threshold (90%)
        run: |
          COVERAGE=$(uv run coverage report | grep TOTAL | awk '{print $4}' | sed 's/%//')
          echo "Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 90" | bc -l) )); then
            echo "::warning::Coverage is below 90% threshold: $COVERAGE%"
          else
            echo "::notice::Coverage meets 90% threshold: $COVERAGE%"
          fi

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [lint-and-format, type-check, security-check, test]
    if: always()
    
    steps:
      - name: Check job results
        run: |
          if [ "${{ needs.lint-and-format.result }}" != "success" ] || \
             [ "${{ needs.type-check.result }}" != "success" ] || \
             [ "${{ needs.security-check.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ Quality gate failed!"
            exit 1
          else
            echo "✅ Quality gate passed!"
          fi
