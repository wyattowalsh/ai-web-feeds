name: Label Manager
on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  auto-label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Label issues by type
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body = context.payload.issue.body || '';
            const labels = [];

            // Check existing labels
            const existingLabels = context.payload.issue.labels.map(l => l.name);

            // Skip if already labeled
            if (existingLabels.length > 0) {
              return;
            }

            // Add size labels
            const bodyLength = body.length;
            if (bodyLength < 500) {
              labels.push('size/small');
            } else if (bodyLength < 2000) {
              labels.push('size/medium');
            } else {
              labels.push('size/large');
            }

            // Add component labels based on content
            if (body.includes('CLI') || body.includes('command line')) {
              labels.push('component/cli');
            }
            if (body.includes('web') || body.includes('website') || body.includes('frontend')) {
              labels.push('component/web');
            }
            if (body.includes('schema') || body.includes('feeds.yaml')) {
              labels.push('component/schema');
            }
            if (body.includes('documentation') || body.includes('docs')) {
              labels.push('component/docs');
            }

            // Add priority labels
            if (title.includes('urgent') || title.includes('critical') || body.includes('blocking')) {
              labels.push('priority/high');
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labels
              });
            }

      - name: Label PRs by files changed
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const labels = new Set();

            for (const file of files) {
              const path = file.filename;

              // Component labels
              if (path.startsWith('apps/cli/')) {
                labels.add('component/cli');
              }
              if (path.startsWith('apps/web/')) {
                labels.add('component/web');
              }
              if (path.startsWith('packages/')) {
                labels.add('component/core');
              }
              if (path.startsWith('data/')) {
                labels.add('component/data');
              }
              if (path.includes('schema')) {
                labels.add('component/schema');
              }
              if (path.includes('.md') || path.startsWith('docs/')) {
                labels.add('component/docs');
              }
              if (path.startsWith('.github/')) {
                labels.add('component/ci-cd');
              }
              if (path.includes('test')) {
                labels.add('component/tests');
              }

              // Size estimate based on changes
              const additions = file.additions || 0;
              const deletions = file.deletions || 0;
              const total = additions + deletions;

              if (total < 50) {
                labels.add('size/small');
              } else if (total < 250) {
                labels.add('size/medium');
              } else {
                labels.add('size/large');
              }
            }

            if (labels.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: Array.from(labels)
              });
            }
