name: 📝 Documentation Update
description: Suggest improvements to documentation
title: "[Docs]: "
labels: ["documentation"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Documentation Update
        
        Help us improve our documentation!

  - type: dropdown
    id: doc_type
    attributes:
      label: Documentation Type
      description: What type of documentation needs updating?
      options:
        - "README"
        - "API Documentation"
        - "User Guide"
        - "Developer Guide"
        - "Schema Documentation"
        - "Contributing Guide"
        - "Code Comments"
        - "Other"
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: File/Location
      description: Which file or section needs updating?
      placeholder: "e.g., README.md, docs/guides/getting-started.md"
    validations:
      required: false

  - type: textarea
    id: issue
    attributes:
      label: Issue with Current Documentation
      description: What's wrong, unclear, or missing in the current documentation?
      placeholder: "The current documentation doesn't explain..."
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Improvement
      description: How should the documentation be improved?
      placeholder: "I suggest adding/changing..."
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context or examples
    validations:
      required: false
